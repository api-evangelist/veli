aid: veli
name: Veli
description: >-
  Veli provides crypto investment strategies via API, enabling platforms to
  offer smart investment solutions while handling running investment strategies,
  buying, selling, rebalancing, and fee collection behind the scenes. Partners
  retain custody and execution while Veli manages the strategy logic.
