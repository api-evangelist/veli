apis:
  - aid: veli:veli
    name: Veli API
    description: >-
      The Veli API enables financial platforms and crypto exchanges to integrate
      automated investment strategies for their users. Partners keep custody and
      execution while Veli handles the strategy engine: portfolio creation, automated
      rebalancing, buy/sell execution signals, fee collection, and performance
      reporting. Supports index-based, theme-based, and custom strategy portfolios.
    humanURL: https://veli.io/
