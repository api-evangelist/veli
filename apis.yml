common:
  - type: Website
    url: https://veli.io/
  - type: Portal
    url: https://veli.io/
  - type: Documentation
    url: https://veli.io/
  - type: SpectralRules
    url: rules/veli-spectral-rules.yml
    title: Veli API Spectral Rules
  - type: Vocabulary
    url: vocabulary/veli-vocabulary.yml
    title: Veli Vocabulary
  - type: NaftikoCapability
    url: capabilities/crypto-investment.yaml
    title: Crypto Investment
  - type: Features
    data:
      - name: Automated Investment Strategies
        description: >-
          Deploy pre-built or custom crypto investment strategies including
          index tracking, theme portfolios, and algorithmic rebalancing.
      - name: Portfolio Rebalancing
        description: >-
          Automatic portfolio rebalancing to maintain target allocations as
          market prices shift, with configurable rebalancing thresholds.
      - name: Partner Custody
        description: >-
          Partners retain full custody and execution of assets while Veli
          provides the strategy logic, signals, and portfolio management.
      - name: Fee Collection
        description: >-
          Built-in fee management for partner platforms to charge management
          fees on invested assets with automated collection workflows.
      - name: Performance Reporting
        description: >-
          Portfolio performance metrics, returns, allocation breakdowns,
          and transaction history for investor reporting and dashboards.
  - type: UseCases
    data:
      - name: Crypto Exchange Investment Products
        description: >-
          Exchanges integrate Veli to offer automated investment portfolios
          (crypto index funds, theme portfolios) to their retail user base.
      - name: Neobank Wealth Features
        description: >-
          Neobanks and fintech apps add crypto investment strategy features
          powered by Veli while maintaining regulatory compliance and custody.
      - name: Robo-Advisor for Crypto
        description: >-
          Build automated crypto wealth management products with goal-based
          portfolio construction, risk profiling, and rebalancing automation.
      - name: White-Label Investment Platform
        description: >-
          Launch branded crypto investment products using Veli's strategy
          engine without building portfolio management infrastructure.
  - type: Integrations
    data:
      - name: Crypto Exchanges
        description: >-
          Integrate with major crypto exchanges for execution of buy/sell
          orders triggered by Veli strategy signals.
      - name: Portfolio Trackers
        description: >-
          Connect portfolio data to tracking apps and dashboards via Veli
          performance and allocation APIs.
      - name: KYC/AML Providers
        description: >-
          Integrate identity verification and compliance checks with Veli
          user management for regulated investment products.

